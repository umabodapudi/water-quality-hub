<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Health Water Quality Dashboard</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

body {
  background: radial-gradient(circle at center, #f4f7f6 0%, #e2e8f0 100%);
  min-height: 100vh;
  padding: 20px;
}

/* HEADER */
header { text-align: center; margin-bottom: 25px; }
header h1 { color: #1e3a8a; font-size: 2.2rem; font-weight: 800; }
header p { color: #475569; margin-top: 5px; }

/* HUB */
.hub-container {
  position: relative;
  width: 100%;
  max-width: 950px;
  height: 580px;
  margin: auto;
  display: flex;
  justify-content: center;
  align-items: center;
}

.center-core {
  width: 170px;
  height: 170px;
  background: linear-gradient(135deg, #3b82f6, #1d4ed8);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 800;
  z-index: 10;
  text-align: center;
}

/* NODES */
.node {
  position: absolute;
  width: 230px;
  padding: 18px;
  border-radius: 12px;
  background: white;
  border: 1px solid #e2e8f0;
  cursor: pointer;
  transition: 0.3s;
}

.node:hover { transform: translateY(-5px); }

.node h3 { font-size: 1rem; font-weight: 700; }
.node p { font-size: 0.8rem; color: #64748b; }

.node-contam { border-top: 5px solid #ef4444; }
.node-matrix { border-top: 5px solid #3b82f6; }
.node-infra { border-top: 5px solid #06b6d4; }
.node-cross { border-top: 5px solid #f59e0b; }
.node-filter { border-top: 5px solid #10b981; }
.node-rights { border-top: 5px solid #8b5cf6; }

/* POSITIONS */
.n1 { top: 15px; left: 50%; transform: translateX(-50%); }
.n2 { top: 110px; right: 20px; }
.n3 { bottom: 110px; right: 20px; }
.n4 { bottom: 15px; left: 50%; transform: translateX(-50%); }
.n5 { bottom: 110px; left: 20px; }
.n6 { top: 110px; left: 20px; }

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  right: -100%;
  width: 100%;
  max-width: 650px;
  height: 100%;
  background: white;
  transition: 0.35s;
  z-index: 999;
  overflow-y: auto;
  border-left: 5px solid #1d4ed8;
}

.overlay.open { right: 0; }

.overlay-header {
  display: flex;
  justify-content: space-between;
  padding: 18px;
  border-bottom: 1px solid #eee;
}

.overlay-body { padding: 20px; }

.close-btn { padding: 6px 12px; cursor: pointer; }

/* FILTER */
.filter-btn {
  padding: 6px 10px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  margin-right: 5px;
}

.filter-btn.active {
  background: #1d4ed8;
  color: white;
}

.contaminant-item {
  border: 1px solid #e2e8f0;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  background: #f8fafc;
}

.hidden-item { display: none; }
</style>
</head>

<body>

<header>
<h1>Public Health Water Quality Dashboard</h1>
<p>Radial Water Safety Intelligence System</p>
</header>

<div class="hub-container">

<div class="center-core">Drinking Water</div>

<div class="node node-contam n1" data-pack="contam"><h3>Contaminants</h3><p>PFAS, metals, bacteria</p></div>
<div class="node node-matrix n2" data-pack="matrix"><h3>Treatment</h3><p>Municipal systems</p></div>
<div class="node node-infra n3" data-pack="infra"><h3>Infrastructure</h3><p>Water journey</p></div>
<div class="node node-cross n4" data-pack="cross"><h3>Backflow</h3><p>Cross contamination</p></div>
<div class="node node-filter n5" data-pack="filter"><h3>Filtration</h3><p>Home systems</p></div>
<div class="node node-rights n6" data-pack="rights"><h3>Legal Rights</h3><p>EPA SDWA rules</p></div>

</div>

<div class="overlay" id="overlay">
<div class="overlay-header">
<h2 id="title"></h2>
<button class="close-btn" onclick="closePanel()">Close</button>
</div>
<div class="overlay-body" id="content"></div>
</div>

<script>

const overlay=document.getElementById("overlay");
const title=document.getElementById("title");
const content=document.getElementById("content");

const titles={
contam:"Contaminant Encyclopedia",
matrix:"Treatment Matrix",
infra:"Infrastructure & Journey",
cross:"Cross-Connections",
filter:"Home Filtration",
rights:"Legal Consumer Rights"
};

/* FULL DATA - NOT CUT */
const dataPacks={

contam:`
<h3>Contaminant Encyclopedia</h3>

<div>
<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="chemical">Chemicals</button>
<button class="filter-btn" data-filter="heavy">Heavy Metals</button>
<button class="filter-btn" data-filter="bio">Biological</button>
</div>

<div class="contaminant-item" data-type="chemical">
<b>PFAS:</b> Forever chemicals from industry<br>MCL: 4 ppt
</div>

<div class="contaminant-item" data-type="heavy">
<b>Lead:</b> Neurotoxin from old pipes<br>Action: 15 ppb
</div>

<div class="contaminant-item" data-type="heavy">
<b>Copper:</b> Pipe corrosion metal<br>Action: 1.3 ppm
</div>

<div class="contaminant-item" data-type="bio">
<b>E. coli:</b> Sewage contamination indicator
</div>
`,

matrix:`
<h3>Treatment Process</h3>
<ol>
<li>Coagulation</li>
<li>Sedimentation</li>
<li>Filtration</li>
<li>Disinfection</li>
</ol>
<p>Advanced: RO, Carbon, UV</p>
`,

infra:`Water source → treatment → storage → pipes → tap`,

cross:`Backflow occurs via pressure reversal or siphon failure`,

filter:`
Carbon filters, RO systems, softeners, distillation systems
`,

rights:`
Annual reports, emergency alerts, lead disclosure, public rights
`
};

document.querySelectorAll(".node").forEach(n=>{
n.onclick=()=>{
const k=n.dataset.pack;
title.innerText=titles[k];
content.innerHTML=dataPacks[k];
overlay.classList.add("open");
};
});

function closePanel(){
overlay.classList.remove("open");
}

/* FILTER FIX */
document.addEventListener("click",e=>{
if(e.target.classList.contains("filter-btn")){
const f=e.target.dataset.filter;

document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");

document.querySelectorAll(".contaminant-item").forEach(i=>{
i.classList.toggle("hidden-item", !(f==="all"||i.dataset.type===f));
});
}
});

</script>

</body>
</html>
