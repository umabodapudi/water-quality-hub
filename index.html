<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Dashboard</title>

<style>
body { margin:0; font-family:Segoe UI; background:#f4f7f6; }

/* HUB */
.hub-container {
  position:relative;
  width:100%;
  height:600px;
  max-width:950px;
  margin:auto;
  display:flex;
  justify-content:center;
  align-items:center;
}

.center-core {
  width:170px;height:170px;
  border-radius:50%;
  background:#1d4ed8;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
}

/* NODES */
.node {
  position:absolute;
  width:220px;
  padding:15px;
  background:white;
  border-radius:10px;
  cursor:pointer;
  border:1px solid #ddd;
}
.node:hover { transform:translateY(-5px); }

.n1{top:10px;left:50%;transform:translateX(-50%);}
.n2{top:120px;right:10px;}
.n3{bottom:120px;right:10px;}
.n4{bottom:10px;left:50%;transform:translateX(-50%);}
.n5{bottom:120px;left:10px;}
.n6{top:120px;left:10px;}

/* OVERLAY */
.overlay {
  position:fixed;
  right:-100%;
  top:0;
  width:600px;
  height:100%;
  background:white;
  transition:0.3s;
  overflow:auto;
  border-left:4px solid #1d4ed8;
}
.overlay.open { right:0; }

.overlay-body { padding:20px; }

/* CONTAMINANTS */
.contaminant-item {
  padding:12px;
  margin:10px 0;
  border:1px solid #eee;
  border-radius:8px;
  background:#f9fafb;
}

.filter-btn {
  margin:3px;
  padding:6px 10px;
  border:1px solid #ccc;
  background:white;
  cursor:pointer;
}
.filter-btn.active {
  background:#1d4ed8;
  color:white;
}

.hidden { display:none; }

</style>
</head>

<body>

<div class="hub-container">
  <div class="center-core">Water</div>

  <div class="node n1" data-key="contam">Contaminants</div>
  <div class="node n2" data-key="matrix">Treatment</div>
  <div class="node n3" data-key="infra">Infrastructure</div>
  <div class="node n4" data-key="cross">Backflow</div>
  <div class="node n5" data-key="filter">Filtration</div>
  <div class="node n6" data-key="rights">Rights</div>
</div>

<div class="overlay" id="overlay">
<div class="overlay-body" id="content"></div>
</div>

<script>

const overlay=document.getElementById("overlay");
const content=document.getElementById("content");

const data = {

contam: `
<h2>Contaminant Encyclopedia</h2>

<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="chemical">Chemical</button>
<button class="filter-btn" data-filter="heavy">Heavy Metals</button>
<button class="filter-btn" data-filter="bio">Biological</button>

<div id="list">

<div class="contaminant-item" data-type="chemical">
<h4>PFAS / PFOS</h4>
<p>Industrial forever chemicals from coatings and firefighting foam.</p>
<p><b>MCL:</b> 4 ppt</p>
<p><b>When:</b> Long term exposure above limit</p>
</div>

<div class="contaminant-item" data-type="heavy">
<h4>Lead</h4>
<p>Neurotoxic metal from old plumbing systems.</p>
<p><b>Action:</b> 15 ppb</p>
</div>

<div class="contaminant-item" data-type="heavy">
<h4>Copper</h4>
<p>Leaches from pipes causing metallic taste.</p>
<p><b>Action:</b> 1.3 ppm</p>
</div>

<div class="contaminant-item" data-type="bio">
<h4>E. coli</h4>
<p>Indicates sewage contamination in water system.</p>
</div>

<div class="contaminant-item" data-type="chemical">
<h4>Nitrates</h4>
<p>Fertilizer runoff causing Blue Baby Syndrome risk.</p>
<p><b>MCL:</b> 10 mg/L</p>
</div>

<div class="contaminant-item" data-type="bio">
<h4>Cyanotoxins</h4>
<p>Algal bloom toxins in warm stagnant water.</p>
</div>

</div>
`,

matrix:`FULL MATRIX CONTENT HERE`,
infra:`FULL INFRA CONTENT HERE`,
cross:`FULL CROSS CONTENT HERE`,
filter:`FULL FILTER CONTENT HERE`,
rights:`FULL RIGHTS CONTENT HERE`

};

document.querySelectorAll(".node").forEach(n=>{
n.onclick=()=>{
content.innerHTML=data[n.dataset.key];
overlay.classList.add("open");
};
});

document.addEventListener("click",e=>{
if(e.target.classList.contains("filter-btn")){
const f=e.target.dataset.filter;

document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");

document.querySelectorAll(".contaminant-item").forEach(i=>{
i.classList.toggle("hidden", !(f==="all" || i.dataset.type===f));
});
}
});

</script>

</body>
</html>
