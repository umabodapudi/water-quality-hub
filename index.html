<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Health Water Quality Dashboard</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Segoe UI; }

body {
  background: radial-gradient(circle, #f4f7f6, #e2e8f0);
  min-height: 100vh;
  padding: 20px;
}

/* HUB */
.hub-container {
  position: relative;
  width: 100%;
  max-width: 950px;
  height: 600px;
  margin: auto;
}

.center-core {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 170px;
  height: 170px;
  background: #1d4ed8;
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  text-align: center;
}

/* NODES */
.node {
  position: absolute;
  width: 230px;
  padding: 15px;
  background: white;
  border-radius: 10px;
  border: 1px solid #ddd;
  cursor: pointer;
}
.node:hover { transform: translateY(-5px); }

.n1 { top: 10px; left: 50%; transform: translateX(-50%); }
.n2 { top: 120px; right: 10px; }
.n3 { bottom: 120px; right: 10px; }
.n4 { bottom: 10px; left: 50%; transform: translateX(-50%); }
.n5 { bottom: 120px; left: 10px; }
.n6 { top: 120px; left: 10px; }

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  right: -100%;
  width: 650px;
  height: 100%;
  background: white;
  overflow-y: auto;
  transition: 0.3s;
  border-left: 4px solid #1d4ed8;
}
.overlay.open { right: 0; }

.overlay-body { padding: 20px; }

.filter-btn {
  padding: 6px 10px;
  margin: 3px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}

.filter-btn.active {
  background: #1d4ed8;
  color: white;
}

.contaminant-item {
  padding: 12px;
  margin: 10px 0;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  background: #f8fafc;
}

.hidden { display: none; }

h4 { margin-top: 10px; }

</style>
</head>

<body>

<div class="hub-container">

<div class="center-core">Drinking Water</div>

<div class="node n1" data-key="contam">Contaminants</div>
<div class="node n2" data-key="matrix">Treatment</div>
<div class="node n3" data-key="infra">Infrastructure</div>
<div class="node n4" data-key="cross">Backflow</div>
<div class="node n5" data-key="filter">Filtration</div>
<div class="node n6" data-key="rights">Rights</div>

</div>

<div class="overlay" id="overlay">
<div class="overlay-body" id="content"></div>
</div>

<script>

const overlay=document.getElementById("overlay");
const content=document.getElementById("content");

const data={

contam:`
<h2>Contaminant Encyclopedia</h2>

<button class="filter-btn active" data-filter="all">All Parameters</button>
<button class="filter-btn" data-filter="chemical">Chemicals and PFAS</button>
<button class="filter-btn" data-filter="heavy">Heavy Metals</button>
<button class="filter-btn" data-filter="bio">Bacteria and Toxins</button>

<div class="contaminant-item" data-type="chemical">
<h4>PFAS / PFOS (Forever Chemicals)</h4>
Synthetic chemical compounds originating from industrial wastewater, water-repellent fabrics, and firefighting foams. They accumulate in biological tissues and do not break down.<br><br>
<b>MCL:</b> 4.0 ppt<br>
<b>When to worry:</b> Continuous exceedance above 4.0 ppt over a year.
</div>

<div class="contaminant-item" data-type="heavy">
<h4>Lead</h4>
A severe neurotoxic metal that leaches from aging plumbing, brass fixtures, and service lines.<br><br>
<b>Action Level:</b> 15 ppb<br>
<b>When to worry:</b> Homes built before 1986 or stagnant water > 6 hours.
</div>

<div class="contaminant-item" data-type="heavy">
<h4>Copper</h4>
A metallic element that dissolves from corroding pipes causing blue-green staining.<br><br>
<b>Action Level:</b> 1.3 ppm<br>
<b>When to worry:</b> Metallic taste or pipe corrosion signs.
</div>

<div class="contaminant-item" data-type="bio">
<h4>Cyanotoxins</h4>
Liver and nerve toxins from algal blooms in warm stagnant water.<br><br>
<b>Regulation:</b> No fixed federal MCL<br>
<b>When to worry:</b> Heat waves + official Do Not Drink advisory.
</div>

<div class="contaminant-item" data-type="chemical">
<h4>Nitrates</h4>
Agricultural runoff from fertilizers and septic systems.<br><br>
<b>MCL:</b> 10 mg/L<br>
<b>Risk:</b> Blue Baby Syndrome in infants.
</div>

<div class="contaminant-item" data-type="bio">
<h4>Coliforms / E. coli</h4>
Indicator bacteria showing sewage contamination.<br><br>
<b>Threshold:</b> Any detection triggers emergency violation.
</div>
`,

matrix:`
<h2>Treatment Matrix</h2>

The Conventional Filtration Architecture:
Coagulation → Sedimentation → Sand Filtration → Disinfection (Chlorine/UV/Ozone)

<br><br>

Advanced Treatment Systems:
<br>
<b>PFAS:</b> Activated Carbon, Ion Exchange, Reverse Osmosis<br>
<b>Lead/Copper:</b> pH adjustment, Orthophosphate dosing<br>
<b>Cyanotoxins:</b> Ozone oxidation, PAC injection<br>
<b>Nitrates:</b> Ion exchange, RO membranes<br>
<b>Arsenic:</b> Iron coagulation, greensand filtration<br>
<b>Pathogens:</b> UV + Chlorination
`,

infra:`
<h2>Infrastructure & Journey</h2>

Water Flow:
Source → Treatment Plant → Storage Tank → Distribution Mains → Tap

<br><br>

System Types:
CWS (Community), NTNCWS (Schools/Industries), TNCWS (Rest stops)

<br><br>

Operators:
Licensed Class 1–4 depending on system size and complexity
`,

cross:`
<h2>Cross-Connections & Backflow</h2>

Backflow occurs when contaminated water reverses into clean supply.

<br><br>

Types:
• Backsiphonage (pressure drop)
• Backpressure (reverse force)

<br><br>

Prevention:
• Air gap separation
• RPZ valve system
• Vacuum breakers
`,

filter:`
<h2>Home Filtration</h2>

Carbon filters → removes chlorine & taste<br>
Reverse Osmosis → removes heavy metals, PFAS, nitrates<br>
Water softeners → removes hardness minerals<br>
Distillation → steam purification
`,

rights:`
<h2>Legal Rights (SDWA)</h2>

1. Annual Water Quality Report (CCR)<br>
2. Emergency violation alerts (24-hour rule)<br>
3. Lead service line disclosure rights<br>
4. Public participation in water governance
`

};

document.querySelectorAll(".node").forEach(n=>{
n.onclick=()=>{
content.innerHTML=data[n.dataset.key];
overlay.classList.add("open");
};
});

document.addEventListener("click",e=>{
if(e.target.classList.contains("filter-btn")){
let f=e.target.dataset.filter;

document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
e.target.classList.add("active");

document.querySelectorAll(".contaminant-item").forEach(i=>{
i.classList.toggle("hidden", !(f==="all"||i.dataset.type===f));
});
}
});

</script>

</body>
</html>
