<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Health Impact Calculator</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

body {
    background: radial-gradient(circle at center, #f4f7f6 0%, #e2e8f0 100%);
    min-height: 100vh;
    padding: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.main-content{
    margin-left:260px;
    padding:30px;
}
.calc-wrapper {
    width: 100%;
    max-width: 1000px;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 30px;
    margin-top: 20px;
}

.input-panel {
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.input-panel h2 {
    color: #1e3a8a;
    font-size: 1.4rem;
    margin-bottom: 20px;
    font-weight: 800;
    border-bottom: 2px solid #f1f5f9;
    padding-bottom: 10px;
}

.input-panel select,
.input-panel input {
    width: 100%;
    padding: 12px 14px;
    font-size: 1rem;
    border-radius: 8px;
}


.form-group select,
.form-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
}

.calc-btn {
    width: 100%;
    padding: 12px;
    background: #1d4ed8;
    color: white;
    border: none;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
}

.calc-wrapper {
    gap: 40px;
}

.form-group {
    margin-bottom: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
}


.output-panel {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    border: 1px solid #e2e8f0;
    min-height: 400px;
    display: flex;
    flex-direction: column;
}

.welcome-view {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    flex: 1;
    color: #64748b;
    text-align: center;
}

.report-header {
    border-bottom: 2px solid #f1f5f9;
    padding-bottom: 15px;
    margin-bottom: 20px;
}


.metric-pill-box {
    display: flex;
    gap: 12px;
    margin-top: 15px;
    margin-bottom: 18px; 
    flex-wrap: wrap;
}


.metric-pill {
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    white-space: nowrap;
}

.report-header {
    padding-bottom: 18px;
    margin-bottom: 20px;
    border-bottom: 2px solid #f1f5f9;
}

.status-strip {
    padding: 12px;
    border-radius: 6px;
    font-weight: 800;
    margin-bottom: 20px;
}

.status-low { background: #d1fae5; }
.status-mod { background: #fef3c7; }
.status-high { background: #ffedd5; }
.status-crit { background: #fee2e2; }



#exceed {
    background: #fff3f3;
    border: 1px solid #fecaca;
    color: #b91c1c;
    font-weight: 700;
}
    
.tab-box {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}


.tab-btn {
    padding: 10px 14px;
    border-radius: 8px 8px 0 0;
    background: #f8fafc;
    border: 1px solid transparent;
    cursor: pointer;
    font-weight: 700;
}
    
.tab-box {
    display: flex;
    gap: 6px;
    border-bottom: 2px solid #e2e8f0;
    margin-top: 10px;
    margin-bottom: 15px;
    padding-bottom: 6px;
}

.tab-btn.active {
    background: white;
    border: 1px solid #e2e8f0;
    border-bottom: 2px solid white;
    color: #1d4ed8;
}

.tab-content { display: none; }
.tab-content.active { display: block; }

.tab-content li {
    margin-bottom: 8px;
    color: #334155;
}
</style>
</head>


<body>

<div class="sidebar">
    ...
</div>

<div class="main-content">

<h1>Water Health Impact Calculator</h1>

<div class="calc-wrapper">

<!-- INPUT -->
<div class="input-panel">
<h2>User Input</h2>

<select id="contaminant">
<option>E. coli</option>
<option>Total Coliform</option>
<option>Lead</option>
<option>Copper</option>
<option>Arsenic</option>
<option>Nitrate</option>
<option>Nitrite</option>
<option>PFAS</option>
<option>PFOS</option>
<option>PFOA</option>
<option>Uranium</option>
<option>Manganese</option>
<option>Turbidity</option>
</select>

<input type="number" id="level" placeholder="Detected level">

<span id="unit">Unit: CFU/100mL</span>

<button class="calc-btn" id="btn">Calculate</button>
</div>

<!-- OUTPUT -->
<div class="output-panel">

<div id="welcome">
<p>Select contaminant to begin</p>
</div>

<div id="report" style="display:none;">

<h2 id="title"></h2>

<div class="status-strip" id="strip">Risk</div>

<div class="metric-pill-box">
<div class="metric-pill" id="user"></div>
<div class="metric-pill" id="limit"></div>
<div class="metric-pill" id="exceed"></div>
</div>

<div class="tab-box">
<button class="tab-btn active" onclick="tab('health')">Health</button>
<button class="tab-btn" onclick="tab('source')">Sources</button>
<button class="tab-btn" onclick="tab('treat')">Treatment</button>
</div>

<div class="tab-content active" id="health"></div>
<div class="tab-content" id="source"></div>
<div class="tab-content" id="treat"></div>

</div>

</div>

</div>

<script>
const data =[{ name: "E. coli", unit: "CFU/100mL", mcl: 0, lowMax: 0, moderateMax: 0, highMax: 0, symptoms: "Severe diarrhea, vomiting, stomach cramps, and acute dehydration threat.", sources: "Raw human sewage breaches, animal feedlot runoff, and sudden water main system drop pressure failures.", treatment: "Boil water alert parameters, commercial ultraviolet (UV) treatment arrays, or intense primary chlorination feed pumps." },{ name: "Total Coliform", unit: "CFU/100mL", mcl: 0, lowMax: 0, moderateMax: 5, highMax: 100, symptoms: "Generally non-harmful alone, but tracks potential entry loops for viruses and severe pathogens.", sources: "Soil intrusion into piping joints, surface water washouts, or treatment plant disinfection bypasses.", treatment: "System chlorination flushes, network loop backwashing, and UV reactors." },{ name: "Lead", unit: "ppb", mcl: 15, lowMax: 15, moderateMax: 30, highMax: 999, symptoms: "Developmental delays, learning disabilities, behavioral problems, and reduced IQ parameters in children.", sources: "Corroding private plumbing lines, interior copper line lead-solder alloys, and underground legacy utility service lines.", treatment: "Under-sink reverse osmosis configurations, NSF-certified lead filtration filters, or full infrastructure physical replacement." },{ name: "Copper", unit: "ppm", mcl: 1.3, lowMax: 1.3, moderateMax: 2.5, highMax: 999, symptoms: "Metallic taste profiles, localized stomach pain irritation, and liver tracking complications if chronic.", sources: "Dissolution out of consumer copper pipe lines caused by highly acidic water running through structural properties.", treatment: "Point-of-entry chemical alkalinity neutralizing blocks or activated carbon media arrays." },{ name: "Arsenic", unit: "ppb", mcl: 10, lowMax: 10, moderateMax: 20, highMax: 999, symptoms: "Long-term skin lesions, peripheral neuropathy, circulatory conditions, and increased long-term cancer risks.", sources: "Natural erosion of deep geologic rock layers into groundwater aquifers, and legacy wood treatment waste lines.", treatment: "Multi-stage reverse osmosis grids, catalytic manganese greensand filters, or activated alumina column configurations." },{ name: "Nitrate", unit: "mg/L", mcl: 10, lowMax: 10, moderateMax: 20, highMax: 999, symptoms: "Methemoglobinemia (Blue Baby Syndrome), blocking vital oxygen translation inside infants under six months of age.", sources: "Commercial agricultural field fertilizers, rural animal manure pools, or cracked neighborhood backyard septic arrays.", treatment: "Specialized anion exchange resin tanks, point-of-use reverse osmosis units, or deep aquifer source restructuring." },{ name: "Nitrite", unit: "mg/L", mcl: 1.0, lowMax: 1.0, moderateMax: 2.0, highMax: 999, symptoms: "Acute oxygen block loops matching nitrate parameters, affecting blood cells.", sources: "Agricultural fertilizer residues and oxidation changes inside distribution mains.", treatment: "Reverse osmosis membranes and specialized ion-exchange resin blocks." },{ name: "PFAS", unit: "ppt", mcl: 4.0, lowMax: 4.0, moderateMax: 10, highMax: 1000, symptoms: "Immune system suppression profiles, liver enzyme adjustments, elevated cholesterol, and carcinogen risks.", sources: "Industrial manufacturing dump runoffs, waterproof fabrics, and high-volume commercial firefighting foam bases.", treatment: "Deep granular activated carbon (GAC) beds, ion-exchange resin vessels, or nanofiltration loops." },{ name: "PFOS", unit: "ppt", mcl: 4.0, lowMax: 4.0, moderateMax: 10, highMax: 1000, symptoms: "Endocrine disruptions and thyroid hormone adjustments.", sources: "Industrial waterproofing waste coatings and structural defense runoff.", treatment: "Granular activated carbon filters and high-pressure membranes." },{ name: "PFOA", unit: "ppt", mcl: 4.0, lowMax: 4.0, moderateMax: 10, highMax: 1000, symptoms: "Increased cancer risk trends and cellular mutation parameters.", sources: "Non-stick cookware plant lines and specialized manufacturing factories.", treatment: "Point-of-use reverse osmosis and activated carbon blocks." },{ name: "Uranium", unit: "ppb", mcl: 30, lowMax: 30, moderateMax: 60, highMax: 999, symptoms: "Kidney toxicity and chronic renal framework complications.", sources: "Natural geological bedrock decay into deep water tables.", treatment: "Anion exchange resins and under-sink reverse osmosis." },{ name: "Manganese", unit: "ppb", mcl: 50, lowMax: 50, moderateMax: 100, highMax: 999, symptoms: "Neurological tracking issues resembling Parkinson's properties if exposure is chronic.", sources: "Natural subterranean rock erosion and industrial steel production runoff.", treatment: "Chemical oxidation combined with greensand filtration setups." },{ name: "Turbidity", unit: "NTU", mcl: 1.0, lowMax: 1.0, moderateMax: 5.0, highMax: 50, symptoms: "Cloudy appearance that shelters parasites and blocks disinfection rays.", sources: "Topsoil storm runoff erosion, reservoir mud stirs, or city main line pipe ruptures.", treatment: "Alum polymer coagulation feeds and sand bed filtration layers." }];

const c=document.getElementById("contaminant");
const l=document.getElementById("level");
const u=document.getElementById("unit");


const temp = data.find(item => item.name === c.value);
if (temp) u.innerText = "Unit: " + temp.unit;

c.onchange = () => {
    const d = data.find(item => item.name === c.value);
    if (d) u.innerText = "Unit: " + d.unit;
};

document.getElementById("btn").onclick=()=>{

const n=c.value;
const v=parseFloat(l.value);
const d = data.find(item => item.name === n);

const init = data.find(item => item.name === c.value);
if (init) u.innerText = "Unit: " + init.unit;

if(!d || isNaN(v)){
alert("Invalid input");
return;
}

document.getElementById("welcome").style.display="none";
document.getElementById("report").style.display="block";

document.getElementById("title").innerText=n;

document.getElementById("user").innerText="Your: "+v+" "+d.unit;
document.getElementById("limit").innerText="Limit: "+d.mcl+" "+d.unit;

const exceedBox = document.getElementById("exceed");

let isExceeded = false;

if (d.mcl === 0) {
    // bacteria rule: any detection = risk
    isExceeded = v > 0;
} else {
    isExceeded = v > d.mcl;
}

if (isExceeded) {
    const factor = d.mcl > 0 ? (v / d.mcl).toFixed(2) : "Detected";
    exceedBox.innerText = `Exceeds Limit: ${factor}`;
} else {
    exceedBox.innerText = "Within safe range";
}

    

let risk="Low",cls="status-low";

if(v>d.mcl*2){risk="High";cls="status-high";}
else if(v>d.mcl){risk="Moderate";cls="status-mod";}

document.getElementById("strip").innerText=`Risk Status: ${risk}`;
document.getElementById("strip").className="status-strip "+cls;


document.getElementById("health").innerHTML =
(Array.isArray(d.symptoms)
    ? d.symptoms
    : [d.symptoms]
).map(x => "<li>" + x + "</li>").join("");
document.getElementById("source").innerHTML =
(Array.isArray(d.sources)
    ? d.sources
    : [d.sources]
).map(x => "<li>" + x + "</li>").join("");
document.getElementById("treat").innerHTML =
(Array.isArray(d.treatment)
    ? d.treatment
    : [d.treatment]
).map(x => "<li>" + x + "</li>").join("");


tab('health');
};

function tab(t){
document.querySelectorAll(".tab-content").forEach(x=>x.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));

document.getElementById(t).classList.add("active");
event.target.classList.add("active");
}
</script>

</div>

</body>
</html>
