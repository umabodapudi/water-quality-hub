<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Health Impact Calculator</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

body {
    background: radial-gradient(circle at center, #f4f7f6 0%, #e2e8f0 100%);
    min-height: 100vh;
    padding: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.calc-wrapper {
    width: 100%;
    max-width: 1000px;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 30px;
    margin-top: 20px;
}

.input-panel {
    background: #ffffff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    border: 1px solid #e2e8f0;
    height: fit-content;
}

.input-panel h2 {
    color: #1e3a8a;
    font-size: 1.4rem;
    margin-bottom: 20px;
    font-weight: 800;
    border-bottom: 2px solid #f1f5f9;
    padding-bottom: 10px;
}

.form-group { margin-bottom: 18px; }

.form-group label {
    display: block;
    font-size: 0.9rem;
    font-weight: 700;
    color: #475569;
    margin-bottom: 6px;
}

.form-group select,
.form-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
}

.calc-btn {
    width: 100%;
    padding: 12px;
    background: #1d4ed8;
    color: white;
    border: none;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
}

.output-panel {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    border: 1px solid #e2e8f0;
    min-height: 400px;
    display: flex;
    flex-direction: column;
}

.welcome-view {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    flex: 1;
    color: #64748b;
    text-align: center;
}

.report-header {
    border-bottom: 2px solid #f1f5f9;
    padding-bottom: 15px;
    margin-bottom: 20px;
}

.metric-pill-box {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
}

.metric-pill {
    background: #f8fafc;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 0.85rem;
    border: 1px solid #e2e8f0;
}

.status-strip {
    padding: 12px;
    border-radius: 6px;
    font-weight: 800;
    margin-bottom: 20px;
}

.status-low { background: #d1fae5; }
.status-mod { background: #fef3c7; }
.status-high { background: #ffedd5; }
.status-crit { background: #fee2e2; }

.tab-box {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.tab-btn {
    background: none;
    border: none;
    font-weight: 700;
    padding: 8px 12px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
}

.tab-btn.active {
    color: #1d4ed8;
    border-bottom: 2px solid #1d4ed8;
}

.tab-content { display: none; }
.tab-content.active { display: block; }

.tab-content li {
    margin-bottom: 8px;
    color: #334155;
}
</style>
</head>

<body>

<h1>Water Health Impact Calculator</h1>

<div class="calc-wrapper">

<!-- INPUT -->
<div class="input-panel">
<h2>User Input</h2>

<select id="contaminant">
<option>E. coli</option>
<option>Total Coliform</option>
<option>Lead</option>
<option>Copper</option>
<option>Arsenic</option>
<option>Nitrate</option>
<option>Nitrite</option>
<option>PFAS</option>
<option>PFOS</option>
<option>PFOA</option>
<option>Uranium</option>
<option>Manganese</option>
<option>Turbidity</option>
</select>

<input type="number" id="level" placeholder="Detected level">

<span id="unit">Unit: CFU/100mL</span>

<button class="calc-btn" id="btn">Calculate</button>
</div>

<!-- OUTPUT -->
<div class="output-panel">

<div id="welcome">
<p>Select contaminant to begin</p>
</div>

<div id="report" style="display:none;">

<h2 id="title"></h2>

<div class="status-strip" id="strip">Risk</div>

<div class="metric-pill-box">
<div class="metric-pill" id="user"></div>
<div class="metric-pill" id="limit"></div>
<div class="metric-pill" id="exceed"></div>
</div>

<div class="tab-box">
<button class="tab-btn active" onclick="tab('health')">Health</button>
<button class="tab-btn" onclick="tab('source')">Sources</button>
<button class="tab-btn" onclick="tab('treat')">Treatment</button>
</div>

<div class="tab-content active" id="health"></div>
<div class="tab-content" id="source"></div>
<div class="tab-content" id="treat"></div>

</div>

</div>

</div>

<script>
const data = {
"E. coli": {unit:"CFU/100mL",mcl:0,effects:["Diarrhea","Vomiting"],sources:["Fecal contamination"],treat:["Boiling","UV"]},
"Lead": {unit:"ppb",mcl:15,effects:["Brain damage"],sources:["Old pipes"],treat:["RO filter"]},
"PFAS": {unit:"ppt",mcl:4,effects:["Hormone disruption"],sources:["Industry"],treat:["Activated carbon"]},
"Arsenic": {unit:"ppb",mcl:10,effects:["Cancer"],sources:["Natural rocks"],treat:["RO system"]}
};

const c=document.getElementById("contaminant");
const l=document.getElementById("level");
const u=document.getElementById("unit");

u.innerText="Unit: "+data[c.value].unit;

c.onchange=()=>u.innerText="Unit: "+data[c.value].unit;

document.getElementById("btn").onclick=()=>{

const n=c.value;
const v=parseFloat(l.value);
const d=data[n];

if(!d || isNaN(v)){
alert("Invalid input");
return;
}

document.getElementById("welcome").style.display="none";
document.getElementById("report").style.display="block";

document.getElementById("title").innerText=n;

document.getElementById("user").innerText="Your: "+v+" "+d.unit;
document.getElementById("limit").innerText="Limit: "+d.mcl+" "+d.unit;

let risk="Low",cls="status-low";

if(v>d.mcl*2){risk="High";cls="status-high";}
else if(v>d.mcl){risk="Moderate";cls="status-mod";}

document.getElementById("strip").innerText=`Risk Status: ${risk}`;
document.getElementById("strip").className="status-strip "+cls;

document.getElementById("health").innerHTML=d.effects.map(x=>"<li>"+x+"</li>").join("");
document.getElementById("source").innerHTML=d.sources.map(x=>"<li>"+x+"</li>").join("");
document.getElementById("treat").innerHTML=d.treat.map(x=>"<li>"+x+"</li>").join("");

tab('health');
};

function tab(t){
document.querySelectorAll(".tab-content").forEach(x=>x.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(x=>x.classList.remove("active"));

document.getElementById(t).classList.add("active");
event.target.classList.add("active");
}
</script>

</body>
</html>
